
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font-sans); }
.wrap { padding: 1.5rem 0; }
.summary-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 1.5rem; }
.metric { background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 0.875rem 1rem; }
.metric label { font-size: 12px; color: var(--color-text-secondary); display: block; margin-bottom: 4px; }
.metric input { font-size: 20px; font-weight: 500; color: var(--color-text-primary); background: transparent; border: none; outline: none; width: 100%; }
.metric .derived { font-size: 20px; font-weight: 500; color: var(--color-text-primary); }
.metric.danger .derived { color: var(--color-text-danger); }
.table-wrap { overflow-x: auto; border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); }
table { width: 100%; border-collapse: collapse; font-size: 13px; min-width: 720px; table-layout: fixed; }
thead th { background: var(--color-background-secondary); font-weight: 500; font-size: 12px; color: var(--color-text-secondary); padding: 10px 10px; text-align: left; border-bottom: 0.5px solid var(--color-border-tertiary); position: sticky; top: 0; z-index: 1; }
thead th:nth-child(1) { width: 100px; }
thead th:nth-child(2) { width: 60px; }
thead th:nth-child(3) { width: 80px; }
thead th:nth-child(4) { width: 80px; }
thead th:nth-child(5) { width: 80px; }
thead th:nth-child(6) { width: 110px; }
thead th:nth-child(7) { width: 80px; }
thead th:nth-child(8) { width: 40px; }
tbody tr { border-bottom: 0.5px solid var(--color-border-tertiary); }
tbody tr:last-child { border-bottom: none; }
tbody tr:hover { background: var(--color-background-secondary); }
tbody td { padding: 7px 10px; vertical-align: middle; }
tbody td input { width: 100%; background: transparent; border: none; outline: none; font-size: 13px; color: var(--color-text-primary); font-family: var(--font-sans); }
tbody td input:focus { background: var(--color-background-info); border-radius: 4px; padding: 2px 4px; margin: -2px -4px; }
.calc { color: var(--color-text-secondary); font-size: 13px; }
.ratio { font-weight: 500; }
.ratio.high { color: var(--color-text-danger); }
.ratio.med { color: var(--color-text-warning); }
.ratio.ok { color: var(--color-text-success); }
.add-row { display: flex; align-items: center; gap: 8px; margin-top: 1rem; }
.add-row button { font-size: 13px; padding: 6px 14px; cursor: pointer; }
.del-btn { background: none; border: none; cursor: pointer; color: var(--color-text-tertiary); font-size: 16px; padding: 2px 4px; border-radius: 4px; }
.del-btn:hover { color: var(--color-text-danger); background: var(--color-background-danger); }
.footer-total td { font-weight: 500; font-size: 13px; background: var(--color-background-secondary); padding: 8px 10px; border-top: 0.5px solid var(--color-border-tertiary); color: var(--color-text-primary); }
.tag { display: inline-block; font-size: 11px; padding: 1px 6px; border-radius: 10px; background: var(--color-background-info); color: var(--color-text-info); margin-left: 4px; font-weight: 500; }
</style>

<div class="wrap">
  <h2 class="sr-only" style="position:absolute;left:-9999px">期貨部位追蹤表</h2>

  <div class="summary-grid">
    <div class="metric">
      <label>權益數</label>
      <input type="number" id="equity" placeholder="0" oninput="recalc()" />
    </div>
    <div class="metric">
      <label>原始保證金</label>
      <input type="number" id="margin" placeholder="0" oninput="recalc()" />
    </div>
    <div class="metric" id="drop-metric">
      <label>可跌部位</label>
      <div class="derived" id="drop-display">—</div>
    </div>
  </div>

  <div class="table-wrap">
    <table id="pos-table">
      <thead>
        <tr>
          <th>標的名稱</th>
          <th>口數</th>
          <th>一口點數</th>
          <th>成本價</th>
          <th>現價</th>
          <th>現貨部位</th>
          <th>部位佔比</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="pos-body"></tbody>
      <tfoot>
        <tr class="footer-total">
          <td colspan="5" style="color:var(--color-text-secondary)">合計</td>
          <td id="total-pos">—</td>
          <td id="total-ratio">—</td>
          <td></td>
        </tr>
      </tfoot>
    </table>
  </div>

  <div class="add-row">
    <button onclick="addRow()"><i class="ti ti-plus" aria-hidden="true"></i> 新增標的</button>
  </div>
</div>

<script>
let rows = [];
let rowId = 0;

function getMultiplier(name) {
  const n = (name || '').trim();
  if (n.startsWith('微台')) return 10;
  if (n.startsWith('小台')) return 50;
  if (n.startsWith('台指')) return 200;
  if (n.startsWith('小型')) return 100;
  return 2000;
}

function fmt(n) {
  if (isNaN(n) || n === null) return '—';
  return Math.round(n).toLocaleString('zh-TW');
}

function addRow() {
  const id = ++rowId;
  rows.push({ id });
  renderRows();
  const nameInput = document.getElementById('name-' + id);
  if (nameInput) nameInput.focus();
}

function removeRow(id) {
  rows = rows.filter(r => r.id !== id);
  renderRows();
  recalc();
}

function renderRows() {
  const body = document.getElementById('pos-body');
  body.innerHTML = '';
  rows.forEach(r => {
    const tr = document.createElement('tr');
    tr.id = 'row-' + r.id;
    tr.innerHTML = `
      <td><input type="text" id="name-${r.id}" placeholder="e.g. 小台202506" oninput="updateRow(${r.id})" /></td>
      <td><input type="number" id="qty-${r.id}" placeholder="0" oninput="updateRow(${r.id})" /></td>
      <td><span class="calc" id="mult-${r.id}">—</span></td>
      <td><input type="number" id="cost-${r.id}" placeholder="0" oninput="updateRow(${r.id})" /></td>
      <td><input type="number" id="price-${r.id}" placeholder="0" oninput="updateRow(${r.id})" /></td>
      <td><span class="calc" id="pos-${r.id}">—</span></td>
      <td><span class="calc ratio" id="ratio-${r.id}">—</span></td>
      <td><button class="del-btn" onclick="removeRow(${r.id})" title="刪除"><i class="ti ti-x" aria-hidden="true"></i></button></td>
    `;
    body.appendChild(tr);
  });
  recalc();
}

function updateRow(id) { recalc(); }

function recalc() {
  const equity = parseFloat(document.getElementById('equity').value) || 0;
  const margin = parseFloat(document.getElementById('margin').value) || 0;
  const drop = equity - margin;

  const dropEl = document.getElementById('drop-display');
  const dropMetric = document.getElementById('drop-metric');
  dropEl.textContent = isNaN(drop) ? '—' : fmt(drop);
  dropMetric.classList.toggle('danger', drop < 0);

  let totalPos = 0;
  let allValid = false;

  rows.forEach(r => {
    const name = (document.getElementById('name-' + r.id) || {}).value || '';
    const qty = parseFloat((document.getElementById('qty-' + r.id) || {}).value) || 0;
    const price = parseFloat((document.getElementById('price-' + r.id) || {}).value);
    const mult = getMultiplier(name);

    const multEl = document.getElementById('mult-' + r.id);
    const posEl = document.getElementById('pos-' + r.id);
    const ratioEl = document.getElementById('ratio-' + r.id);

    if (multEl) multEl.textContent = mult.toLocaleString('zh-TW');

    if (!isNaN(price) && qty !== 0) {
      const pos = qty * mult * price;
      totalPos += pos;
      allValid = true;
      if (posEl) posEl.textContent = fmt(pos);

      if (equity > 0 && ratioEl) {
        const ratio = (pos / equity) * 100;
        ratioEl.textContent = ratio.toFixed(1) + '%';
        ratioEl.className = 'calc ratio ' + (ratio > 60 ? 'high' : ratio > 30 ? 'med' : 'ok');
      } else if (ratioEl) {
        ratioEl.textContent = '—';
        ratioEl.className = 'calc ratio';
      }
    } else {
      if (posEl) posEl.textContent = '—';
      if (ratioEl) { ratioEl.textContent = '—'; ratioEl.className = 'calc ratio'; }
    }
  });

  const totalPosEl = document.getElementById('total-pos');
  const totalRatioEl = document.getElementById('total-ratio');
  if (allValid) {
    totalPosEl.textContent = fmt(totalPos);
    if (equity > 0) {
      const totalRatio = (totalPos / equity) * 100;
      totalRatioEl.textContent = totalRatio.toFixed(1) + '%';
      totalRatioEl.style.color = totalRatio > 60 ? 'var(--color-text-danger)' : totalRatio > 30 ? 'var(--color-text-warning)' : 'var(--color-text-success)';
    } else {
      totalRatioEl.textContent = '—';
    }
  } else {
    totalPosEl.textContent = '—';
    totalRatioEl.textContent = '—';
  }
}

addRow();
addRow();
</script>
