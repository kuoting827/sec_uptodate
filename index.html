<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Futures Tracker Pro V4.1</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body{background:#111;color:#eee;font-family:Arial,sans-serif;margin:16px}
h1{margin-bottom:16px}
.cards{display:grid;grid-template-columns:repeat(3,minmax(110px,1fr));gap:8px}
.card,.chartbox{background:#1b1b1b;border-radius:10px;padding:12px}
input{width:100%;padding:6px;background:#222;color:#fff;border:1px solid #333;border-radius:6px}
.table-wrap{overflow:auto;margin-top:16px}
table{width:100%;border-collapse:collapse;background:#1b1b1b;min-width:950px}
th,td{padding:8px;border-bottom:1px solid #333;text-align:center}
th{background:#222;position:sticky;top:0}
button{padding:8px 12px;background:#333;color:#fff;border:none;border-radius:6px;cursor:pointer}
.profit{color:#ff4d4f;font-weight:bold}
.loss{color:#52c41a;font-weight:bold}
.actions{margin:12px 0}

.table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
table{min-width:720px !important;table-layout:fixed !important}
th:nth-child(1),td:nth-child(1){width:90px}
th:nth-child(2),td:nth-child(2){width:28px}
th:nth-child(3),td:nth-child(3){width:75px}
th:nth-child(4),td:nth-child(4){width:75px}
th:nth-child(5),td:nth-child(5){width:60px}
th:nth-child(6),td:nth-child(6){width:110px}
th:nth-child(7),td:nth-child(7){width:110px}
th:nth-child(8),td:nth-child(8){width:70px}

.mult,.pnl,.pos,.ratio{white-space:nowrap}

@media (max-width:768px){
  body{margin:10px}
  th,td{padding:4px;font-size:12px}
  input{padding:4px;font-size:12px}
  h1{font-size:22px}
}

</style>
</head>
<body>
<h1>期貨部位追蹤表 V4.1 穩定版</h1>

<div class="cards">
<div class="card"><div>權益數</div><input id="equity"></div>
<div class="card"><div>原始保證金</div><input id="margin"></div>
<div class="card"><div>可跌部位</div><h2 id="drop">0</h2></div>
</div>


<div class="cards" style="margin-top:10px">
<div class="card">
<div>總現貨部位</div>
<h2 id="summaryPos">0</h2>
</div>
<div class="card">
<div>總槓桿倍數</div>
<h2 id="summaryLev">0x</h2>
</div>
</div>

<div class="actions">
<button onclick="addRow()">新增標的</button>
<button onclick="exportData()">匯出</button>
<input type="file" onchange="importData(event)">
</div>

<div class="table-wrap">
<table>
<thead>
<tr>
<th>標的名稱</th><th>口數</th><th>成本價</th><th>現價</th>
<th>一口點數</th><th>未實現損益</th><th>現貨部位</th><th>槓桿倍數</th><th></th>
</tr>
</thead>
<tbody id="tbody"></tbody>
<tfoot>
<tr>
<td colspan="5"><b>合計</b></td>
<td id="totalPnlCell">0</td>
<td id="totalPosCell">0</td>
<td id="totalRatioCell">0x</td>
<td></td>
</tr>
</tfoot>
</table>
</div>

<div class="chartbox">
<h3>部位佔比圓餅圖</h3>
<canvas id="pieChart"></canvas>
</div>

<script>
let chart=null;

function parseNum(v){return Number(String(v).replace(/,/g,''))||0;}
function fmt(v){return Math.round(v).toLocaleString('zh-TW');}

function multiplier(name){
 if(name.startsWith('微台')) return 10;
 if(name.startsWith('小台')) return 50;
 if(name.startsWith('台指')) return 200;
 if(name.startsWith('小型')) return 100;
 return 2000;
}

function formatMoneyInput(el){
 const n=parseNum(el.value);
 if(el.value!=="") el.value=n.toLocaleString('zh-TW');
}

function addRow(data={}){
 const tr=document.createElement('tr');
 tr.innerHTML=`
 <td><input class="name" value="${data.name||''}"></td>
 <td><input class="qty" type="number" value="${data.qty||1}"></td>
 <td><input class="cost" type="number" value="${data.cost||''}"></td>
 <td><input class="price" type="number" value="${data.price||''}"></td>
 <td class="mult">0</td>
 <td class="pnl">0</td>
 <td class="pos">0</td>
 <td class="ratio">0%</td>
 <td><button onclick="this.closest('tr').remove();recalc()">✕</button></td>`;
 tr.querySelectorAll('input').forEach(i=>i.addEventListener('input',recalc));
 tbody.appendChild(tr);
 recalc();
}

function recalc(){
 const equity=parseNum(equityEl.value);
 const margin=parseNum(marginEl.value);

 drop.textContent=fmt(equity-margin);

 let totalPnl=0,totalPos=0;
 const labels=[],data=[];

 document.querySelectorAll('#tbody tr').forEach(tr=>{
   const name=tr.querySelector('.name').value||'未命名';
   const qty=parseNum(tr.querySelector('.qty').value);
   const cost=parseNum(tr.querySelector('.cost').value);
   const price=parseNum(tr.querySelector('.price').value);

   const mult=multiplier(name);
   const pnl=(price-cost)*qty*mult;
   const pos=qty*mult*price;
   const ratio=equity?pos/equity*100:0;

   tr.querySelector('.mult').textContent=fmt(mult);

   const pnlCell=tr.querySelector('.pnl');
   pnlCell.textContent=fmt(pnl);
   pnlCell.className='pnl '+(pnl>0?'profit':pnl<0?'loss':'');

   tr.querySelector('.pos').textContent=fmt(pos);
   tr.querySelector('.ratio').textContent=ratio.toFixed(2)+'x';

   totalPnl+=pnl;
   totalPos+=pos;

   if(pos>0){labels.push(name+" ("+ratio.toFixed(2)+"x)");data.push(pos);}
 });

 totalPnlCell.textContent=fmt(totalPnl);
 totalPnlCell.className=(totalPnl>0?'profit':totalPnl<0?'loss':'');

 totalPosCell.textContent=fmt(totalPos);
 
const lev=(equity?totalPos/equity:0);
totalRatioCell.textContent=lev.toFixed(2)+'x';
document.getElementById('summaryPos').textContent=fmt(totalPos);
document.getElementById('summaryLev').textContent=lev.toFixed(2)+'x';


 localStorage.setItem('futuresV41',JSON.stringify(saveData()));
 drawChart(labels,data);
}

function drawChart(labels,data){
 const ctx=document.getElementById('pieChart');
 if(chart) chart.destroy();
 chart=new Chart(ctx,{
   type:'pie',
   data:{labels:labels,datasets:[{data:data}]},
   options:{responsive:true,plugins:{legend:{labels:{color:'white'}}}}
 });
}

function saveData(){
 const rows=[];
 document.querySelectorAll('#tbody tr').forEach(tr=>{
   rows.push({
     name:tr.querySelector('.name').value,
     qty:tr.querySelector('.qty').value,
     cost:tr.querySelector('.cost').value,
     price:tr.querySelector('.price').value
   });
 });
 return {equity:equityEl.value,margin:marginEl.value,rows};
}

function exportData(){
 const blob=new Blob([JSON.stringify(saveData(),null,2)],{type:'application/json'});
 const a=document.createElement('a');
 a.href=URL.createObjectURL(blob);
 a.download='futures_v41_backup.json';
 a.click();
}

function importData(e){
 const f=e.target.files[0];
 const r=new FileReader();
 r.onload=()=>{localStorage.setItem('futuresV41',r.result);location.reload();};
 r.readAsText(f);
}

const equityEl=document.getElementById('equity');
const marginEl=document.getElementById('margin');

[equityEl,marginEl].forEach(el=>{
 el.addEventListener('focus',()=>el.value=String(parseNum(el.value)||''));
 el.addEventListener('blur',()=>{formatMoneyInput(el);recalc();});
 el.addEventListener('input',recalc);
});

window.onload=()=>{
 const saved=localStorage.getItem('futuresV41');
 if(saved){
   const d=JSON.parse(saved);
   equityEl.value=d.equity||'';
   marginEl.value=d.margin||'';
   d.rows.forEach(r=>addRow(r));
 }else{
   addRow();addRow();
 }
 formatMoneyInput(equityEl);
 formatMoneyInput(marginEl);
 recalc();
};
</script>
</body>
</html>
