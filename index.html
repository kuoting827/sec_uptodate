<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>期貨部位追蹤表</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f7f7f5;--surface:#fff;--surface2:#f1f0ed;
  --border:rgba(0,0,0,.1);--border2:rgba(0,0,0,.18);
  --text:#1a1a18;--text2:#6b6b67;--text3:#a0a09c;
  --green:#2d7d46;--red:#c0392b;--red-bg:#fdecea;
  --orange:#c47b00;--blue-bg:#e8f1fb;
  --r:10px;--rl:14px
}
@media(prefers-color-scheme:dark){:root{
  --bg:#141412;--surface:#1e1e1b;--surface2:#272724;
  --border:rgba(255,255,255,.1);--border2:rgba(255,255,255,.18);
  --text:#f0f0ec;--text2:#9a9a94;--text3:#5a5a56;
  --green:#4caf70;--red:#e05a4a;--red-bg:#2b100d;
  --orange:#e0a030;--blue-bg:#0d1e33
}}
body{font-family:'Helvetica Neue','PingFang TC','Microsoft JhengHei',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:2rem 1rem}
.wrap{max-width:1000px;margin:0 auto}
h1{font-size:22px;font-weight:600;letter-spacing:-.3px;margin-bottom:4px}
.sub{font-size:13px;color:var(--text2);margin-bottom:1.75rem}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:1.5rem}
@media(max-width:500px){.grid3{grid-template-columns:1fr 1fr}.grid3 .mc:last-child{grid-column:1/-1}}
.mc{background:var(--surface);border:.5px solid var(--border);border-radius:var(--r);padding:14px 16px}
.mc-label{font-size:11px;font-weight:500;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:6px}
.mc-wrap{position:relative;min-height:34px}
.mc-disp{font-size:22px;font-weight:600;color:var(--text);line-height:1.35;pointer-events:none;user-select:none}
.mc-disp.dim{color:var(--text3);font-weight:400}
.mc-inp{position:absolute;inset:0;width:100%;font-size:22px;font-weight:600;color:transparent;caret-color:var(--text);background:transparent;border:none;outline:none;font-family:inherit}
.mc-val{font-size:22px;font-weight:600;color:var(--text);line-height:1.35}
.mc.neg .mc-val{color:var(--red)}
.card{background:var(--surface);border:.5px solid var(--border);border-radius:var(--rl);overflow:hidden}
.tscroll{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px;min-width:800px;table-layout:fixed}
col.n{width:115px}col.q{width:58px}col.mu{width:72px}col.co{width:85px}col.pr{width:85px}col.pn{width:110px}col.po{width:110px}col.ra{width:78px}col.de{width:40px}
thead th{background:var(--surface2);font-size:11px;font-weight:500;color:var(--text2);text-transform:uppercase;letter-spacing:.4px;padding:10px;text-align:left;border-bottom:.5px solid var(--border);white-space:nowrap}
tbody tr{border-bottom:.5px solid var(--border)}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:var(--surface2)}
td{padding:6px 10px;vertical-align:middle}
.ti{width:100%;background:transparent;border:none;outline:none;font-size:13px;color:var(--text);font-family:inherit}
.ti:focus{background:var(--blue-bg);border-radius:5px;padding:2px 5px;margin:-2px -5px}
.cv{font-size:13px;color:var(--text2)}
.gn{color:var(--green);font-weight:500}
.rd{color:var(--red);font-weight:500}
.or{color:var(--orange);font-weight:500}
tfoot td{background:var(--surface2);border-top:.5px solid var(--border2);padding:9px 10px;font-size:13px;font-weight:600;color:var(--text)}
.xbtn{background:none;border:none;cursor:pointer;color:var(--text3);width:26px;height:26px;border-radius:6px;display:flex;align-items:center;justify-content:center;margin:auto;font-size:14px;line-height:1;transition:background .15s,color .15s}
.xbtn:hover{background:var(--red-bg);color:var(--red)}
.bar{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;border-top:.5px solid var(--border);flex-wrap:wrap;gap:8px}
.addbtn{display:inline-flex;align-items:center;gap:6px;font-size:13px;font-weight:500;font-family:inherit;color:var(--text);background:var(--surface2);border:.5px solid var(--border2);border-radius:8px;padding:6px 14px;cursor:pointer;transition:background .15s}
.addbtn:hover{filter:brightness(.95)}
.hint{font-size:12px;color:var(--text3)}
</style>
</head>
<body>
<div class="wrap">
  <h1>期貨部位追蹤表</h1>
  <p class="sub">即時計算未實現損益、現貨部位與部位佔比</p>

  <div class="grid3">
    <div class="mc">
      <span class="mc-label">權益數</span>
      <div class="mc-wrap">
        <div class="mc-disp dim" id="eqD">0</div>
        <input class="mc-inp" type="number" id="eq" placeholder="0">
      </div>
    </div>
    <div class="mc">
      <span class="mc-label">原始保證金</span>
      <div class="mc-wrap">
        <div class="mc-disp dim" id="mgD">0</div>
        <input class="mc-inp" type="number" id="mg" placeholder="0">
      </div>
    </div>
    <div class="mc" id="dropCard">
      <span class="mc-label">可跌部位</span>
      <div class="mc-val" id="dropVal">—</div>
    </div>
  </div>

  <div class="card">
    <div class="tscroll">
      <table>
        <colgroup><col class="n"><col class="q"><col class="mu"><col class="co"><col class="pr"><col class="pn"><col class="po"><col class="ra"><col class="de"></colgroup>
        <thead>
          <tr>
            <th>標的名稱</th><th>口數</th><th>一口點數</th>
            <th>成本價</th><th>現價</th><th>未實現損益</th>
            <th>現貨部位</th><th>部位佔比</th><th></th>
          </tr>
        </thead>
        <tbody id="tb"></tbody>
        <tfoot>
          <tr>
            <td colspan="5" style="color:var(--text2);font-weight:500">合計</td>
            <td id="fPnl">—</td><td id="fPos">—</td><td id="fRat">—</td><td></td>
          </tr>
        </tfoot>
      </table>
    </div>
    <div class="bar">
      <button class="addbtn" id="addBtn">＋ 新增標的</button>
      <span class="hint">微台×10 · 小台×50 · 台指×200 · 小型×100 · 其他×2000</span>
    </div>
  </div>
</div>

<script>
(function(){
  var rows=[], uid=0;

  function mp(name){
    var n=(name||'').trim();
    if(n.slice(0,2)==='微台') return 10;
    if(n.slice(0,2)==='小台') return 50;
    if(n.slice(0,2)==='台指') return 200;
    if(n.slice(0,2)==='小型') return 100;
    return 2000;
  }

  function fmt(n){
    return (isNaN(n)||n===null||n===undefined)?'—':Math.round(n).toLocaleString('zh-TW');
  }

  function g(id){ return document.getElementById(id); }

  function syncDisp(inpId, dispId){
    var inp=g(inpId), disp=g(dispId);
    if(!inp||!disp) return;
    var v=parseFloat(inp.value);
    if(inp.value===''||isNaN(v)){
      disp.textContent='0'; disp.className='mc-disp dim';
    } else {
      disp.textContent=Math.round(v).toLocaleString('zh-TW'); disp.className='mc-disp';
    }
  }

  function calc(){
    syncDisp('eq','eqD');
    syncDisp('mg','mgD');
    var equity=parseFloat(g('eq').value)||0;
    var margin=parseFloat(g('mg').value)||0;
    var drop=equity-margin;
    g('dropVal').textContent=(equity||margin)?fmt(drop):'—';
    if(drop<0&&(equity||margin)) g('dropCard').classList.add('neg');
    else g('dropCard').classList.remove('neg');

    var tPnl=0,tPos=0,aPnl=false,aPos=false;

    for(var i=0;i<rows.length;i++){
      var id=rows[i];
      var nEl=g('n'+id), qEl=g('q'+id), cEl=g('c'+id), pEl=g('p'+id);
      var mEl=g('m'+id), uEl=g('u'+id), sEl=g('s'+id), tEl=g('t'+id);
      if(!nEl) continue;

      var name=nEl.value||'';
      var qty=qEl.value!==''?parseFloat(qEl.value):NaN;
      var cost=cEl.value!==''?parseFloat(cEl.value):NaN;
      var price=pEl.value!==''?parseFloat(pEl.value):NaN;
      var m=mp(name);

      mEl.textContent=m.toLocaleString('zh-TW');

      var okQty=!isNaN(qty)&&qty!==0;
      var okPrc=!isNaN(price);
      var okCst=!isNaN(cost);

      if(okQty&&okPrc&&okCst){
        var pnl=(price-cost)*qty*m;
        tPnl+=pnl; aPnl=true;
        uEl.textContent=fmt(pnl);
        uEl.className='cv'+(pnl>0?' gn':pnl<0?' rd':'');
      } else {
        uEl.textContent='—'; uEl.className='cv';
      }

      if(okQty&&okPrc){
        var pos=qty*m*price;
        tPos+=pos; aPos=true;
        sEl.textContent=fmt(pos);
        if(equity>0){
          var rat=(pos/equity)*100;
          tEl.textContent=rat.toFixed(1)+'%';
          tEl.className='cv'+(rat>60?' rd':rat>30?' or':' gn');
        } else { tEl.textContent='—'; tEl.className='cv'; }
      } else {
        sEl.textContent='—';
        tEl.textContent='—'; tEl.className='cv';
      }
    }

    var fp=g('fPnl'),fs=g('fPos'),ft=g('fRat');
    if(aPnl){
      fp.textContent=fmt(tPnl);
      fp.style.color=tPnl>0?'var(--green)':tPnl<0?'var(--red)':'var(--text)';
    } else { fp.textContent='—'; fp.style.color=''; }
    if(aPos){
      fs.textContent=fmt(tPos);
      if(equity>0){
        var tr=(tPos/equity)*100;
        ft.textContent=tr.toFixed(1)+'%';
        ft.style.color=tr>60?'var(--red)':tr>30?'var(--orange)':'var(--green)';
      } else { ft.textContent='—'; ft.style.color=''; }
    } else { fs.textContent='—'; ft.textContent='—'; ft.style.color=''; }
  }

  function addRow(){
    var id=++uid;
    rows.push(id);
    var tb=g('tb');
    var tr=document.createElement('tr');
    tr.id='row'+id;
    tr.innerHTML=
      '<td><input class="ti" type="text"   id="n'+id+'" placeholder="小台202506"></td>'+
      '<td><input class="ti" type="number" id="q'+id+'" placeholder="1"></td>'+
      '<td><span class="cv" id="m'+id+'">2,000</span></td>'+
      '<td><input class="ti" type="number" id="c'+id+'" placeholder="0"></td>'+
      '<td><input class="ti" type="number" id="p'+id+'" placeholder="0"></td>'+
      '<td><span class="cv" id="u'+id+'">—</span></td>'+
      '<td><span class="cv" id="s'+id+'">—</span></td>'+
      '<td><span class="cv" id="t'+id+'">—</span></td>'+
      '<td><button class="xbtn" data-rid="'+id+'">✕</button></td>';
    tb.appendChild(tr);

    tr.querySelector('.xbtn').addEventListener('click', function(){
      var rid=parseInt(this.getAttribute('data-rid'),10);
      rows=rows.filter(function(x){ return x!==rid; });
      var el=g('row'+rid);
      if(el) el.parentNode.removeChild(el);
      calc();
    });

    ['n','q','c','p'].forEach(function(k){
      var el=g(k+id);
      if(el) el.addEventListener('input', calc);
    });

    g('n'+id).focus();
    calc();
  }

  g('eq').addEventListener('input', calc);
  g('mg').addEventListener('input', calc);
  g('addBtn').addEventListener('click', addRow);
  addRow();
  addRow();
})();
</script>
</body>
</html>
