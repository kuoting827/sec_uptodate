<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>期貨部位追蹤表 Pro</title>
<style>
body{background:#111;color:#eee;font-family:Arial,sans-serif;margin:20px}
.card{background:#1b1b1b;border-radius:10px;padding:12px;margin-bottom:15px}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
input{width:100%;background:#222;color:#fff;border:1px solid #333;padding:8px;border-radius:6px}
table{width:100%;border-collapse:collapse}
th,td{padding:8px;border-bottom:1px solid #333;text-align:left}
th{background:#1b1b1b}
button{background:#333;color:#fff;border:none;padding:8px 12px;border-radius:6px;cursor:pointer}
.profit{color:#ff4d4f;font-weight:bold}
.loss{color:#52c41a;font-weight:bold}
.warn{color:#ff7875}
</style>
</head>
<body>
<h2>期貨部位追蹤表 Pro</h2>

<div class="grid">
<div class="card"><div>權益數</div><input id="equity" type="number"></div>
<div class="card"><div>原始保證金</div><input id="margin" type="number"></div>
<div class="card"><div>可跌部位</div><div id="drop">0</div></div>
</div>

<div class="card">
<table>
<thead>
<tr>
<th>標的名稱</th>
<th>口數</th>
<th>成本價</th>
<th>現價</th>
<th>一口點數</th>
<th>未實現損益</th>
<th>現貨部位</th>
<th>部位佔比</th>
<th></th>
</tr>
</thead>
<tbody id="tbody"></tbody>
<tfoot>
<tr>
<td colspan="5">合計</td>
<td id="totalPnl">0</td>
<td id="totalPos">0</td>
<td id="totalRatio">0%</td>
<td></td>
</tr>
</tfoot>
</table>
<br>
<button onclick="addRow()">新增標的</button>
<button onclick="exportData()">匯出</button>
<input type="file" id="importFile" onchange="importData(event)">
</div>

<script>
let rows=[];
let uid=0;

function getMultiplier(name){
 if(name.startsWith('微台')) return 10;
 if(name.startsWith('小台')) return 50;
 if(name.startsWith('台指')) return 200;
 if(name.startsWith('小型')) return 100;
 return 2000;
}

function save(){
 localStorage.setItem('futuresTrackerPro',JSON.stringify({
 equity:document.getElementById('equity').value,
 margin:document.getElementById('margin').value,
 rows:rows
 }));
}

function load(){
 let d=localStorage.getItem('futuresTrackerPro');
 if(!d) return;
 d=JSON.parse(d);
 document.getElementById('equity').value=d.equity||'';
 document.getElementById('margin').value=d.margin||'';
 rows=d.rows||[];
 uid=Math.max(0,...rows.map(r=>r.id));
 rows.forEach(r=>renderRow(r.id,r));
 recalc();
}

function addRow(data={}){
 const id=++uid;
 rows.push({id});
 renderRow(id,data);
 save();
}

function renderRow(id,data={}){
 const tr=document.createElement('tr');
 tr.id='row'+id;
 tr.innerHTML=`
<td><input value="${data.name||''}" oninput="recalc()"></td>
<td><input type="number" value="${data.qty||1}" oninput="recalc()"></td>
<td><input type="number" value="${data.cost||''}" oninput="recalc()"></td>
<td><input type="number" value="${data.price||''}" oninput="recalc()"></td>
<td class="mult">0</td>
<td class="pnl">0</td>
<td class="pos">0</td>
<td class="ratio">0%</td>
<td><button onclick="delRow(${id})">✕</button></td>`;
 document.getElementById('tbody').appendChild(tr);
}

function delRow(id){
 rows=rows.filter(x=>x.id!==id);
 document.getElementById('row'+id).remove();
 recalc();
 save();
}

function recalc(){
 let eq=Number(equity.value)||0;
 let mg=Number(margin.value)||0;
 drop.textContent=(eq-mg).toLocaleString();

 let totalPnl=0,totalPos=0;

 document.querySelectorAll('#tbody tr').forEach(tr=>{
   let t=tr.querySelectorAll('input');
   let name=t[0].value||'';
   let qty=Number(t[1].value)||0;
   let cost=Number(t[2].value)||0;
   let price=Number(t[3].value)||0;

   let mult=getMultiplier(name);
   let pnl=(price-cost)*qty*mult;
   let pos=qty*mult*price;
   let ratio=eq?pos/eq*100:0;

   tr.querySelector('.mult').textContent=mult;
   let pnlEl=tr.querySelector('.pnl');
   pnlEl.textContent=Math.round(pnl).toLocaleString();
   pnlEl.className='pnl '+(pnl>0?'profit':pnl<0?'loss':'');

   tr.querySelector('.pos').textContent=Math.round(pos).toLocaleString();
   tr.querySelector('.ratio').textContent=ratio.toFixed(1)+'%';

   totalPnl+=pnl;
   totalPos+=pos;
 });

 totalPnlEl=document.getElementById('totalPnl');
 totalPnlEl.textContent=Math.round(totalPnl).toLocaleString();
 totalPnlEl.className=(totalPnl>0?'profit':totalPnl<0?'loss':'');

 totalPosEl.textContent=Math.round(totalPos).toLocaleString();
 totalRatio.textContent=(eq?totalPos/eq*100:0).toFixed(1)+'%';

 save();
}

equity.oninput=recalc;
margin.oninput=recalc;

window.onload=()=>{
 load();
 if(document.querySelectorAll('#tbody tr').length===0){addRow();addRow();}
};
function exportData(){
 const blob=new Blob([localStorage.getItem('futuresTrackerPro')||'{}'],{type:'application/json'});
 const a=document.createElement('a');
 a.href=URL.createObjectURL(blob);
 a.download='futures_tracker_backup.json';
 a.click();
}
function importData(e){
 const f=e.target.files[0];
 const r=new FileReader();
 r.onload=()=>{
   localStorage.setItem('futuresTrackerPro',r.result);
   location.reload();
 };
 r.readAsText(f);
}
</script>
</body>
</html>
