<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>期貨部位追蹤表</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f7f7f5;--sur:#fff;--sur2:#f1f0ed;
  --bd:rgba(0,0,0,.1);--bd2:rgba(0,0,0,.18);
  --tx:#1a1a18;--tx2:#6b6b67;--tx3:#a0a09c;
  --gn:#2d7d46;--rd:#c0392b;--rdbg:#fdecea;--or:#c47b00;--blbg:#e8f1fb
}
@media(prefers-color-scheme:dark){:root{
  --bg:#141412;--sur:#1e1e1b;--sur2:#272724;
  --bd:rgba(255,255,255,.1);--bd2:rgba(255,255,255,.18);
  --tx:#f0f0ec;--tx2:#9a9a94;--tx3:#5a5a56;
  --gn:#4caf70;--rd:#e05a4a;--rdbg:#2b100d;--or:#e0a030;--blbg:#0d1e33
}}
body{font-family:'Helvetica Neue','PingFang TC','Microsoft JhengHei',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;padding:2rem 1rem}
.wrap{max-width:1000px;margin:0 auto}
h1{font-size:22px;font-weight:600;letter-spacing:-.3px;margin-bottom:4px}
.sub{font-size:13px;color:var(--tx2);margin-bottom:1.75rem}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:1.5rem}
@media(max-width:500px){.g3{grid-template-columns:1fr 1fr}.g3>div:last-child{grid-column:1/-1}}
.mc{background:var(--sur);border:.5px solid var(--bd);border-radius:10px;padding:14px 16px}
.mc-lbl{font-size:11px;font-weight:500;color:var(--tx2);text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:6px}
.mc-rel{position:relative;min-height:34px}
.mc-show{font-size:22px;font-weight:600;color:var(--tx);line-height:1.35;pointer-events:none;user-select:none;min-height:34px}
.mc-show.dim{color:var(--tx3);font-weight:400}
.mc-hide{position:absolute;inset:0;width:100%;font-size:22px;font-weight:600;color:transparent;caret-color:var(--tx);background:transparent;border:none;outline:none;font-family:inherit}
.mc-out{font-size:22px;font-weight:600;color:var(--tx);line-height:1.35;min-height:34px}
.neg .mc-out{color:var(--rd)}
.card{background:var(--sur);border:.5px solid var(--bd);border-radius:14px;overflow:hidden}
.scroll{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px;min-width:800px;table-layout:fixed}
.cn{width:115px}.cq{width:58px}.cm{width:72px}.cc{width:85px}.cp{width:85px}.cu{width:110px}.cs{width:110px}.cr{width:78px}.cd{width:40px}
thead th{background:var(--sur2);font-size:11px;font-weight:500;color:var(--tx2);text-transform:uppercase;letter-spacing:.4px;padding:10px;text-align:left;border-bottom:.5px solid var(--bd);white-space:nowrap}
tbody tr{border-bottom:.5px solid var(--bd)}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:var(--sur2)}
td{padding:6px 10px;vertical-align:middle}
.ti{width:100%;background:transparent;border:none;outline:none;font-size:13px;color:var(--tx);font-family:inherit}
.ti:focus{background:var(--blbg);border-radius:5px;padding:2px 5px;margin:-2px -5px}
.cv{font-size:13px;color:var(--tx2)}
.gn{color:var(--gn);font-weight:500}.rd{color:var(--rd);font-weight:500}.or{color:var(--or);font-weight:500}
tfoot td{background:var(--sur2);border-top:.5px solid var(--bd2);padding:9px 10px;font-size:13px;font-weight:600;color:var(--tx)}
.xbtn{background:none;border:none;cursor:pointer;color:var(--tx3);width:26px;height:26px;border-radius:6px;display:flex;align-items:center;justify-content:center;margin:auto;font-size:14px;transition:background .15s,color .15s}
.xbtn:hover{background:var(--rdbg);color:var(--rd)}
.bar{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;border-top:.5px solid var(--bd);flex-wrap:wrap;gap:8px}
.addbtn{display:inline-flex;align-items:center;gap:6px;font-size:13px;font-weight:500;font-family:inherit;color:var(--tx);background:var(--sur2);border:.5px solid var(--bd2);border-radius:8px;padding:6px 14px;cursor:pointer}
.hint{font-size:12px;color:var(--tx3)}
</style>
</head>
<body>
<div class="wrap">
  <h1>期貨部位追蹤表</h1>
  <p class="sub">即時計算未實現損益、現貨部位與部位佔比</p>

  <div class="g3">
    <div class="mc">
      <span class="mc-lbl">權益數</span>
      <div class="mc-rel">
        <div class="mc-show dim" id="eqShow">0</div>
        <input class="mc-hide" type="number" id="eqInp" placeholder="0">
      </div>
    </div>
    <div class="mc">
      <span class="mc-lbl">原始保證金</span>
      <div class="mc-rel">
        <div class="mc-show dim" id="mgShow">0</div>
        <input class="mc-hide" type="number" id="mgInp" placeholder="0">
      </div>
    </div>
    <div class="mc" id="dropCard">
      <span class="mc-lbl">可跌部位</span>
      <div class="mc-out" id="dropOut">—</div>
    </div>
  </div>

  <div class="card">
    <div class="scroll">
      <table>
        <colgroup>
          <col class="cn"><col class="cq"><col class="cm">
          <col class="cc"><col class="cp"><col class="cu">
          <col class="cs"><col class="cr"><col class="cd">
        </colgroup>
        <thead>
          <tr>
            <th>標的名稱</th><th>口數</th><th>一口點數</th>
            <th>成本價</th><th>現價</th><th>未實現損益</th>
            <th>現貨部位</th><th>部位佔比</th><th></th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
        <tfoot>
          <tr>
            <td colspan="5" style="color:var(--tx2);font-weight:500">合計</td>
            <td id="fPnl">—</td>
            <td id="fPos">—</td>
            <td id="fRat">—</td>
            <td></td>
          </tr>
        </tfoot>
      </table>
    </div>
    <div class="bar">
      <button class="addbtn" id="addBtn">＋ 新增標的</button>
      <span class="hint">微台×10 · 小台×50 · 台指×200 · 小型×100 · 其他×2000</span>
    </div>
  </div>
</div>

<script>
var rowIds = [];
var uid = 0;

function getMultiplier(name) {
  var n = name ? name.trim() : '';
  var prefix = n.slice(0, 2);
  if (prefix === '微台') return 10;
  if (prefix === '小台') return 50;
  if (prefix === '台指') return 200;
  if (prefix === '小型') return 100;
  return 2000;
}

function formatNum(n) {
  if (typeof n !== 'number' || isNaN(n)) return '—';
  return Math.round(n).toLocaleString('zh-TW');
}

function updateSummaryDisplay(inpId, showId) {
  var inp = document.getElementById(inpId);
  var show = document.getElementById(showId);
  if (!inp || !show) return;
  var raw = inp.value.trim();
  var v = parseFloat(raw);
  if (raw === '' || isNaN(v)) {
    show.textContent = '0';
    show.className = 'mc-show dim';
  } else {
    show.textContent = Math.round(v).toLocaleString('zh-TW');
    show.className = 'mc-show';
  }
}

function recalcAll() {
  updateSummaryDisplay('eqInp', 'eqShow');
  updateSummaryDisplay('mgInp', 'mgShow');

  var eqRaw = document.getElementById('eqInp').value.trim();
  var mgRaw = document.getElementById('mgInp').value.trim();
  var equity = eqRaw !== '' ? parseFloat(eqRaw) : NaN;
  var margin = mgRaw !== '' ? parseFloat(mgRaw) : NaN;

  var dropOut = document.getElementById('dropOut');
  var dropCard = document.getElementById('dropCard');
  if (!isNaN(equity) || !isNaN(margin)) {
    var eq = isNaN(equity) ? 0 : equity;
    var mg = isNaN(margin) ? 0 : margin;
    var drop = eq - mg;
    dropOut.textContent = formatNum(drop);
    if (drop < 0) dropCard.classList.add('neg');
    else dropCard.classList.remove('neg');
  } else {
    dropOut.textContent = '—';
    dropCard.classList.remove('neg');
  }

  var totalPnl = 0, totalPos = 0, hasPnl = false, hasPos = false;
  var eq2 = isNaN(equity) ? 0 : equity;

  for (var i = 0; i < rowIds.length; i++) {
    var id = rowIds[i];

    var nameInp  = document.getElementById('name_' + id);
    var qtyInp   = document.getElementById('qty_' + id);
    var costInp  = document.getElementById('cost_' + id);
    var priceInp = document.getElementById('price_' + id);
    var multSpan = document.getElementById('mult_' + id);
    var pnlSpan  = document.getElementById('pnl_' + id);
    var posSpan  = document.getElementById('pos_' + id);
    var ratSpan  = document.getElementById('rat_' + id);

    if (!nameInp) continue;

    var name  = nameInp.value;
    var mult  = getMultiplier(name);
    var qtyV  = qtyInp.value.trim();
    var costV = costInp.value.trim();
    var prcV  = priceInp.value.trim();
    var qty   = qtyV   !== '' ? parseFloat(qtyV)  : NaN;
    var cost  = costV  !== '' ? parseFloat(costV) : NaN;
    var price = prcV   !== '' ? parseFloat(prcV)  : NaN;

    multSpan.textContent = mult.toLocaleString('zh-TW');

    var okQ = !isNaN(qty) && qty !== 0;
    var okP = !isNaN(price);
    var okC = !isNaN(cost);

    if (okQ && okP && okC) {
      var pnl = (price - cost) * qty * mult;
      totalPnl += pnl;
      hasPnl = true;
      pnlSpan.textContent = formatNum(pnl);
      pnlSpan.className = pnl > 0 ? 'cv gn' : pnl < 0 ? 'cv rd' : 'cv';
    } else {
      pnlSpan.textContent = '—';
      pnlSpan.className = 'cv';
    }

    if (okQ && okP) {
      var pos = qty * mult * price;
      totalPos += pos;
      hasPos = true;
      posSpan.textContent = formatNum(pos);
      if (eq2 > 0) {
        var rat = (pos / eq2) * 100;
        ratSpan.textContent = rat.toFixed(1) + '%';
        ratSpan.className = rat > 60 ? 'cv rd' : rat > 30 ? 'cv or' : 'cv gn';
      } else {
        ratSpan.textContent = '—';
        ratSpan.className = 'cv';
      }
    } else {
      posSpan.textContent = '—';
      ratSpan.textContent = '—';
      ratSpan.className = 'cv';
    }
  }

  var fPnl = document.getElementById('fPnl');
  var fPos = document.getElementById('fPos');
  var fRat = document.getElementById('fRat');

  if (hasPnl) {
    fPnl.textContent = formatNum(totalPnl);
    fPnl.style.color = totalPnl > 0 ? 'var(--gn)' : totalPnl < 0 ? 'var(--rd)' : '';
  } else {
    fPnl.textContent = '—';
    fPnl.style.color = '';
  }

  if (hasPos) {
    fPos.textContent = formatNum(totalPos);
    if (eq2 > 0) {
      var totRat = (totalPos / eq2) * 100;
      fRat.textContent = totRat.toFixed(1) + '%';
      fRat.style.color = totRat > 60 ? 'var(--rd)' : totRat > 30 ? 'var(--or)' : 'var(--gn)';
    } else {
      fRat.textContent = '—';
      fRat.style.color = '';
    }
  } else {
    fPos.textContent = '—';
    fRat.textContent = '—';
    fRat.style.color = '';
  }
}

function makeInput(type, id, placeholder, cls) {
  var inp = document.createElement('input');
  inp.type = type;
  inp.id = id;
  inp.placeholder = placeholder;
  inp.className = cls;
  inp.addEventListener('input', recalcAll);
  return inp;
}

function makeSpan(id, text, cls) {
  var s = document.createElement('span');
  s.id = id;
  s.textContent = text;
  s.className = cls;
  return s;
}

function addRow() {
  uid++;
  var id = uid;
  rowIds.push(id);

  var tbody = document.getElementById('tbody');
  var tr = document.createElement('tr');
  tr.id = 'row_' + id;

  function td(child) {
    var cell = document.createElement('td');
    if (child) cell.appendChild(child);
    return cell;
  }

  var delBtn = document.createElement('button');
  delBtn.className = 'xbtn';
  delBtn.textContent = '✕';
  delBtn.setAttribute('data-id', id);
  delBtn.addEventListener('click', function() {
    var rid = parseInt(this.getAttribute('data-id'), 10);
    rowIds = rowIds.filter(function(x) { return x !== rid; });
    var row = document.getElementById('row_' + rid);
    if (row) row.parentNode.removeChild(row);
    recalcAll();
  });

  tr.appendChild(td(makeInput('text',   'name_'  + id, '小台202506', 'ti')));
  tr.appendChild(td(makeInput('number', 'qty_'   + id, '1',          'ti')));
  tr.appendChild(td(makeSpan(          'mult_'  + id, '2,000',      'cv')));
  tr.appendChild(td(makeInput('number', 'cost_'  + id, '0',          'ti')));
  tr.appendChild(td(makeInput('number', 'price_' + id, '0',          'ti')));
  tr.appendChild(td(makeSpan(          'pnl_'   + id, '—',          'cv')));
  tr.appendChild(td(makeSpan(          'pos_'   + id, '—',          'cv')));
  tr.appendChild(td(makeSpan(          'rat_'   + id, '—',          'cv')));
  tr.appendChild(td(delBtn));

  tbody.appendChild(tr);
  document.getElementById('name_' + id).focus();
  recalcAll();
}

document.getElementById('eqInp').addEventListener('input', recalcAll);
document.getElementById('mgInp').addEventListener('input', recalcAll);
document.getElementById('addBtn').addEventListener('click', addRow);

addRow();
addRow();
</script>
</body>
</html>
