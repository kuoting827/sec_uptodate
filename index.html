<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>期貨部位追蹤表</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f7f7f5;
    --surface: #ffffff;
    --surface2: #f1f0ed;
    --border: rgba(0,0,0,0.1);
    --border2: rgba(0,0,0,0.18);
    --text: #1a1a18;
    --text2: #6b6b67;
    --text3: #a0a09c;
    --green: #2d7d46;
    --green-bg: #eaf6ee;
    --red: #c0392b;
    --red-bg: #fdecea;
    --orange: #c47b00;
    --orange-bg: #fff4e0;
    --blue: #1a5fa8;
    --blue-bg: #e8f1fb;
    --accent: #1a1a18;
    --radius: 10px;
    --radius-lg: 14px;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #141412;
      --surface: #1e1e1b;
      --surface2: #272724;
      --border: rgba(255,255,255,0.1);
      --border2: rgba(255,255,255,0.18);
      --text: #f0f0ec;
      --text2: #9a9a94;
      --text3: #5a5a56;
      --green: #4caf70;
      --green-bg: #0d2b18;
      --red: #e05a4a;
      --red-bg: #2b100d;
      --orange: #e0a030;
      --orange-bg: #2b1e05;
      --blue: #5a9de0;
      --blue-bg: #0d1e33;
    }
  }

  body {
    font-family: 'Helvetica Neue', 'PingFang TC', 'Microsoft JhengHei', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 2rem 1rem;
  }

  .container {
    max-width: 1000px;
    margin: 0 auto;
  }

  header {
    margin-bottom: 1.75rem;
  }

  header h1 {
    font-size: 22px;
    font-weight: 600;
    letter-spacing: -0.3px;
    color: var(--text);
  }

  header p {
    font-size: 13px;
    color: var(--text2);
    margin-top: 4px;
  }

  .summary-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-bottom: 1.5rem;
  }

  @media (max-width: 500px) {
    .summary-grid { grid-template-columns: 1fr 1fr; }
    .summary-grid .metric:last-child { grid-column: 1 / -1; }
  }

  .metric {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
  }

  .metric label {
    font-size: 11px;
    font-weight: 500;
    color: var(--text2);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    display: block;
    margin-bottom: 6px;
  }

  .metric input {
    font-size: 22px;
    font-weight: 600;
    color: var(--text);
    background: transparent;
    border: none;
    outline: none;
    width: 100%;
    font-family: inherit;
  }

  .metric input::placeholder { color: var(--text3); font-weight: 400; }

  .metric .derived {
    font-size: 22px;
    font-weight: 600;
    color: var(--text);
  }

  .metric.neg .derived { color: var(--red); }

  .card {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-lg);
    overflow: hidden;
  }

  .tbl-wrap { overflow-x: auto; }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
    min-width: 780px;
    table-layout: fixed;
  }

  col.c-name { width: 110px; }
  col.c-qty  { width: 58px; }
  col.c-mult { width: 72px; }
  col.c-cost { width: 82px; }
  col.c-prc  { width: 82px; }
  col.c-pnl  { width: 108px; }
  col.c-pos  { width: 108px; }
  col.c-rat  { width: 78px; }
  col.c-del  { width: 40px; }

  thead th {
    background: var(--surface2);
    font-size: 11px;
    font-weight: 500;
    color: var(--text2);
    text-transform: uppercase;
    letter-spacing: 0.4px;
    padding: 10px 10px;
    text-align: left;
    border-bottom: 0.5px solid var(--border);
    white-space: nowrap;
  }

  tbody tr {
    border-bottom: 0.5px solid var(--border);
    transition: background 0.1s;
  }

  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: var(--surface2); }

  tbody td {
    padding: 7px 10px;
    vertical-align: middle;
  }

  tbody td input {
    width: 100%;
    background: transparent;
    border: none;
    outline: none;
    font-size: 13px;
    color: var(--text);
    font-family: inherit;
  }

  tbody td input:focus {
    background: var(--blue-bg);
    border-radius: 5px;
    padding: 2px 5px;
    margin: -2px -5px;
  }

  .cv { font-size: 13px; color: var(--text2); }
  .pnl-p { color: var(--green); font-weight: 500; }
  .pnl-n { color: var(--red); font-weight: 500; }
  .r-hi { color: var(--red); font-weight: 500; }
  .r-md { color: var(--orange); font-weight: 500; }
  .r-lo { color: var(--green); font-weight: 500; }

  tfoot td {
    background: var(--surface2);
    border-top: 0.5px solid var(--border2);
    padding: 9px 10px;
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
  }

  .del-btn {
    background: none;
    border: none;
    cursor: pointer;
    color: var(--text3);
    width: 24px;
    height: 24px;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: auto;
    font-size: 16px;
    transition: background 0.15s, color 0.15s;
  }

  .del-btn:hover { background: var(--red-bg); color: var(--red); }

  .toolbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 12px;
    border-top: 0.5px solid var(--border);
    background: var(--surface);
  }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    font-weight: 500;
    font-family: inherit;
    color: var(--text);
    background: var(--surface2);
    border: 0.5px solid var(--border2);
    border-radius: 8px;
    padding: 6px 14px;
    cursor: pointer;
    transition: background 0.15s;
  }

  .btn:hover { background: var(--border); }

  .hint {
    font-size: 12px;
    color: var(--text3);
  }

  .badge {
    display: inline-block;
    font-size: 10px;
    font-weight: 600;
    padding: 1px 5px;
    border-radius: 4px;
    background: var(--blue-bg);
    color: var(--blue);
    margin-left: 4px;
    vertical-align: middle;
  }
</style>
</head>
<body>
<div class="container">

  <header>
    <h1>期貨部位追蹤表</h1>
    <p>即時計算未實現損益、現貨部位與部位佔比</p>
  </header>

  <div class="summary-grid">
    <div class="metric">
      <label>權益數</label>
      <input type="number" id="equity" placeholder="0" oninput="calc()">
    </div>
    <div class="metric">
      <label>原始保證金</label>
      <input type="number" id="margin" placeholder="0" oninput="calc()">
    </div>
    <div class="metric" id="drop-card">
      <label>可跌部位</label>
      <div class="derived" id="drop-val">—</div>
    </div>
  </div>

  <div class="card">
    <div class="tbl-wrap">
      <table>
        <colgroup>
          <col class="c-name"><col class="c-qty"><col class="c-mult">
          <col class="c-cost"><col class="c-prc"><col class="c-pnl">
          <col class="c-pos"><col class="c-rat"><col class="c-del">
        </colgroup>
        <thead>
          <tr>
            <th>標的名稱</th>
            <th>口數</th>
            <th>一口點數</th>
            <th>成本價</th>
            <th>現價</th>
            <th>未實現損益</th>
            <th>現貨部位</th>
            <th>部位佔比</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
        <tfoot>
          <tr>
            <td colspan="5" style="color:var(--text2);font-weight:500">合計</td>
            <td id="foot-pnl">—</td>
            <td id="foot-pos">—</td>
            <td id="foot-rat">—</td>
            <td></td>
          </tr>
        </tfoot>
      </table>
    </div>
    <div class="toolbar">
      <button class="btn" onclick="addRow()">＋ 新增標的</button>
      <span class="hint">微台×10 &nbsp;·&nbsp; 小台×50 &nbsp;·&nbsp; 台指×200 &nbsp;·&nbsp; 小型×100 &nbsp;·&nbsp; 其他×2000</span>
    </div>
  </div>

</div>

<script>
let rows = [], uid = 0;

function getMultiplier(name) {
  const n = (name || '').trim();
  if (n.startsWith('微台')) return 10;
  if (n.startsWith('小台')) return 50;
  if (n.startsWith('台指')) return 200;
  if (n.startsWith('小型')) return 100;
  return 2000;
}

function fmt(n) {
  if (n === null || isNaN(n)) return '—';
  return Math.round(n).toLocaleString('zh-TW');
}

function addRow() {
  const id = ++uid;
  rows.push({ id });
  renderRows();
  const el = document.getElementById('n' + id);
  if (el) el.focus();
}

function removeRow(id) {
  rows = rows.filter(r => r.id !== id);
  renderRows();
}

function renderRows() {
  const tb = document.getElementById('tbody');
  tb.innerHTML = '';
  rows.forEach(r => {
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td><input type="text" id="n${r.id}" placeholder="小台202506" oninput="calc()"></td>
      <td><input type="number" id="q${r.id}" placeholder="1" oninput="calc()"></td>
      <td><span class="cv" id="m${r.id}">—</span></td>
      <td><input type="number" id="c${r.id}" placeholder="0" oninput="calc()"></td>
      <td><input type="number" id="p${r.id}" placeholder="0" oninput="calc()"></td>
      <td><span class="cv" id="u${r.id}">—</span></td>
      <td><span class="cv" id="s${r.id}">—</span></td>
      <td><span class="cv" id="t${r.id}">—</span></td>
      <td><button class="del-btn" onclick="removeRow(${r.id})" title="刪除">✕</button></td>
    `;
    tb.appendChild(tr);
  });
  calc();
}

function calc() {
  const equity = parseFloat(document.getElementById('equity').value) || 0;
  const margin = parseFloat(document.getElementById('margin').value) || 0;
  const drop = equity - margin;
  const dv = document.getElementById('drop-val');
  const dc = document.getElementById('drop-card');
  dv.textContent = (equity || margin) ? fmt(drop) : '—';
  dc.classList.toggle('neg', drop < 0 && (equity || margin));

  let totPnl = 0, totPos = 0, anyPnl = false, anyPos = false;

  rows.forEach(r => {
    const name = (document.getElementById('n' + r.id) || {}).value || '';
    const qty  = parseFloat((document.getElementById('q' + r.id) || {}).value);
    const cost = parseFloat((document.getElementById('c' + r.id) || {}).value);
    const price= parseFloat((document.getElementById('p' + r.id) || {}).value);
    const mp   = getMultiplier(name);

    const mEl = document.getElementById('m' + r.id);
    const uEl = document.getElementById('u' + r.id);
    const sEl = document.getElementById('s' + r.id);
    const tEl = document.getElementById('t' + r.id);

    if (mEl) mEl.textContent = mp.toLocaleString('zh-TW');

    const hasQty   = !isNaN(qty) && qty !== 0;
    const hasPrice = !isNaN(price);
    const hasCost  = !isNaN(cost);

    if (hasQty && hasPrice && hasCost) {
      const pnl = (price - cost) * qty * mp;
      totPnl += pnl;
      anyPnl = true;
      if (uEl) {
        uEl.textContent = fmt(pnl);
        uEl.className = 'cv ' + (pnl > 0 ? 'pnl-p' : pnl < 0 ? 'pnl-n' : '');
      }
    } else {
      if (uEl) { uEl.textContent = '—'; uEl.className = 'cv'; }
    }

    if (hasQty && hasPrice) {
      const pos = qty * mp * price;
      totPos += pos;
      anyPos = true;
      if (sEl) sEl.textContent = fmt(pos);
      if (equity > 0 && tEl) {
        const ratio = (pos / equity) * 100;
        tEl.textContent = ratio.toFixed(1) + '%';
        tEl.className = 'cv ' + (ratio > 60 ? 'r-hi' : ratio > 30 ? 'r-md' : 'r-lo');
      } else if (tEl) { tEl.textContent = '—'; tEl.className = 'cv'; }
    } else {
      if (sEl) sEl.textContent = '—';
      if (tEl) { tEl.textContent = '—'; tEl.className = 'cv'; }
    }
  });

  const fp = document.getElementById('foot-pnl');
  const fs = document.getElementById('foot-pos');
  const ft = document.getElementById('foot-rat');

  if (anyPnl) {
    fp.textContent = fmt(totPnl);
    fp.style.color = totPnl > 0 ? 'var(--green)' : totPnl < 0 ? 'var(--red)' : 'var(--text)';
  } else { fp.textContent = '—'; fp.style.color = ''; }

  if (anyPos) {
    fs.textContent = fmt(totPos);
    if (equity > 0) {
      const tr = (totPos / equity) * 100;
      ft.textContent = tr.toFixed(1) + '%';
      ft.style.color = tr > 60 ? 'var(--red)' : tr > 30 ? 'var(--orange)' : 'var(--green)';
    } else { ft.textContent = '—'; ft.style.color = ''; }
  } else { fs.textContent = '—'; ft.textContent = '—'; ft.style.color = ''; }
}

addRow();
addRow();
</script>
</body>
</html>
